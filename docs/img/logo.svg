<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SchemaSense logo">
  <defs>

    <!-- Ivory badge fill -->
    <linearGradient id="badgeFill" x1="24" y1="24" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBF8F2"/>
      <stop offset="1" stop-color="#F0EAD9"/>
    </linearGradient>

    <!-- Vibrant ring gradient — pops on dark -->
    <linearGradient id="ringFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#22D3EE"/>
      <stop offset="0.33" stop-color="#818CF8"/>
      <stop offset="0.66" stop-color="#10B981"/>
      <stop offset="1"    stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Glow filter for hub -->
    <filter id="hubGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A2840" flood-opacity="0.18"/>
    </filter>

    <clipPath id="badgeClip">
      <rect x="24" y="24" width="168" height="168" rx="36"/>
    </clipPath>

  </defs>

  <!-- ─── BADGE SHELL ─────────────────────────────────────── -->
  <g filter="url(#softShadow)">
    <rect x="24" y="24" width="168" height="168" rx="36"
          fill="url(#badgeFill)" stroke="#D6CCBA" stroke-width="1.5"/>
  </g>

  <g clip-path="url(#badgeClip)">

    <!-- Outer precision gauge ring -->
    <circle cx="108" cy="108" r="74" fill="none" stroke="#E4DBC8" stroke-width="9"/>
    <circle cx="108" cy="108" r="70" fill="none" stroke="#D4C9B0" stroke-width="1"/>

    <!-- Cardinal tick marks (engineering gauge feel) -->
    <g stroke="#A89880" stroke-width="2.5" stroke-linecap="round">
      <!-- N --> <line x1="108" y1="34" x2="108" y2="43"/>
      <!-- S --> <line x1="108" y1="173" x2="108" y2="182"/>
      <!-- W --> <line x1="34"  y1="108" x2="43"  y2="108"/>
      <!-- E --> <line x1="173" y1="108" x2="182" y2="108"/>
    </g>

    <!-- Diagonal minor ticks (45°, r=70 → 66) -->
    <!-- NE: (108+49.5, 108-49.5)=(157.5,58.5) to (108+46.7, 108-46.7)=(154.7,61.3) -->
    <g stroke="#C8BDA6" stroke-width="1.5" stroke-linecap="round">
      <line x1="157" y1="59"  x2="154" y2="62"/>
      <line x1="59"  y1="59"  x2="62"  y2="62"/>
      <line x1="59"  y1="157" x2="62"  y2="154"/>
      <line x1="157" y1="157" x2="154" y2="154"/>
    </g>

    <!-- Inner reference circle -->
    <circle cx="108" cy="108" r="54" fill="none" stroke="#DDD4BF" stroke-width="1"/>

    <!-- ── ORCHESTRATION ICON ───────────────────────────── -->

    <!-- Hub → Node spokes (drawn first, behind circles) -->
    <!-- Hub(108,108) → Node A top(108,65) -->
    <line x1="108" y1="108" x2="108" y2="65"
          stroke="#B0A28C" stroke-width="2" stroke-linecap="round"/>
    <!-- Hub → Node B BL(76,133) -->
    <line x1="108" y1="108" x2="76" y2="133"
          stroke="#B0A28C" stroke-width="2" stroke-linecap="round"/>
    <!-- Hub → Node C BR(140,133) -->
    <line x1="108" y1="108" x2="140" y2="133"
          stroke="#B0A28C" stroke-width="2" stroke-linecap="round"/>

    <!-- Node-to-node flow edges (dashed) -->
    <line x1="108" y1="65" x2="76"  y2="133"
          stroke="#CBBFA8" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="5 4"/>
    <line x1="108" y1="65" x2="140" y2="133"
          stroke="#CBBFA8" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="5 4"/>
    <line x1="76"  y1="133" x2="140" y2="133"
          stroke="#CBBFA8" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="5 4"/>

    <!-- Node A — top — Emerald "source / trigger" -->
    <circle cx="108" cy="65" r="14" fill="#F5F0E6" stroke="#10B981" stroke-width="2.2"/>
    <circle cx="108" cy="65" r="5.5" fill="#10B981" opacity="0.92"/>

    <!-- Node B — bottom-left — Cyan "worker / process" -->
    <circle cx="76" cy="133" r="14" fill="#F5F0E6" stroke="#22D3EE" stroke-width="2.2"/>
    <circle cx="76" cy="133" r="5.5" fill="#22D3EE" opacity="0.92"/>

    <!-- Node C — bottom-right — Violet "output / sink" -->
    <circle cx="140" cy="133" r="14" fill="#F5F0E6" stroke="#818CF8" stroke-width="2.2"/>
    <circle cx="140" cy="133" r="5.5" fill="#818CF8" opacity="0.92"/>

    <!-- Central orchestrator hub (with glow) -->
    <g filter="url(#hubGlow)">
      <circle cx="108" cy="108" r="20"
              fill="#1f3144" stroke="url(#ringFill)"
              stroke-width="2.8" stroke-dasharray="18 6" stroke-linecap="round"/>
    </g>
    <circle cx="108" cy="108" r="13" fill="#1a2840"/>
    <text x="108" y="113" text-anchor="middle"
          font-size="14" font-weight="700"
          font-family="'Segoe UI', system-ui, sans-serif"
          fill="#F5F0E6">S</text>

  </g>

  <!-- ─── WORDMARK ──────────────────────────────────────────── -->
  <g transform="translate(240 0)">

    <!-- Main logotype -->
    <text x="0" y="108" font-size="56" font-weight="700"
          font-family="Georgia, 'Times New Roman', serif"
          fill="#3A6494" letter-spacing="-0.8">
      Schema<tspan fill="#A8BCCF">Sense</tspan>
    </text>

    <!-- Tagline -->
    <text x="2" y="138" font-size="18" font-weight="400"
          font-family="Georgia, 'Times New Roman', serif"
          fill="#9CA3AF" letter-spacing="0.3">
      Local multi-agent diagram reasoning
    </text>

    <!-- Capability chips -->
    <g transform="translate(0 164)">

      <rect x="0" y="0" width="124" height="28" rx="14"
            fill="#F5F0E6" stroke="#D6CCBA"/>
      <text x="62" y="18.5" text-anchor="middle"
            font-size="12" font-weight="600"
            font-family="'Segoe UI', system-ui, sans-serif"
            fill="#1a1d24">
        Diagram → Graph
      </text>

      <rect x="136" y="0" width="112" height="28" rx="14"
            fill="#F5F0E6" stroke="#D6CCBA"/>
      <text x="192" y="18.5" text-anchor="middle"
            font-size="12" font-weight="600"
            font-family="'Segoe UI', system-ui, sans-serif"
            fill="#1a1d24">
        Fully Local
      </text>

      <rect x="260" y="0" width="138" height="28" rx="14"
            fill="#F5F0E6" stroke="#D6CCBA"/>
      <text x="329" y="18.5" text-anchor="middle"
            font-size="12" font-weight="600"
            font-family="'Segoe UI', system-ui, sans-serif"
            fill="#1a1d24">
        Evidence-First
      </text>

    </g>
  </g>

</svg>
